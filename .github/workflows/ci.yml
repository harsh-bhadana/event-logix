name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-on: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Mocked Unit Tests
        run: npx vitest run src/lib/actions/__tests__/flows.test.ts src/lib/actions/__tests__/analytics-actions.test.ts src/app/api/upload/__tests__/route.test.ts
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'temporary-jwt-secret-for-ci-tests-at-least-32-chars' }}
          MONGODB_URI: 'mongodb://localhost:27017/ci-placeholder' # Placeholder since unit tests use mocks

      # Optional: Runs full database-backed integration tests if MONGODB_URI secret is configured in GitHub Secrets
      - name: Run Database Integration Tests (Conditional)
        if: "${{ secrets.MONGODB_URI != '' }}"
        run: npx vitest run src/lib/actions/__tests__/integration-flows.test.ts
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
